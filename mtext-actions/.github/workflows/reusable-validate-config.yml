name: Reusable mandant configuration validation

# Dieser wiederverwendbare Workflow validiert die Mandantenkonfiguration eines
# exakten Commits gegen die zentralen Releaselinien, ohne Zielsysteme anzusprechen.
'on':
  workflow_call:
    inputs:
      repository_name:
        required: true
        type: string
      commit_sha:
        required: true
        type: string
      automation_repository:
        required: true
        type: string
      automation_ref:
        required: true
        type: string
      runner_label:
        required: false
        default: mtext-delivery
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate mandant configuration
    runs-on:
      - self-hosted
      - linux
      - ${{ inputs.runner_label }}
    timeout-minutes: 20
    steps:
      # Lädt genau den zu prüfenden Mandanten-Commit in einen getrennten Pfad und
      # speichert dabei keine GitHub-Zugangsdaten in der Git-Konfiguration.
      - name: Check out mandant repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          path: source
          persist-credentials: false
          ref: ${{ inputs.commit_sha }}

      # Lädt den festgelegten Stand der zentralen Validierungslogik und ihrer
      # versionierten Releaselinien-Zuordnung.
      - name: Check out pinned automation
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: ${{ inputs.automation_repository }}
          ref: ${{ inputs.automation_ref }}
          path: automation
          persist-credentials: false

      # Prüft den Self-hosted Runner und stellt den Pfad zur freigegebenen
      # Python-Laufzeit als Ausgabe für die Validierung bereit.
      - name: Prepare approved Python runtime
        id: runtime
        run: automation/scripts/runner-preflight.sh

      # Prüft Struktur und fachliche Zuordnungen der .config.json für das
      # aufrufende Repository; dieser Schritt führt keine externe Übergabe aus.
      - name: Validate configuration without external access
        env:
          INPUT_REPOSITORY_NAME: ${{ inputs.repository_name }}
          PYTHONPATH: automation/src
        run: >-
          "${{ steps.runtime.outputs.python }}" -m lbs_delivery validate-config
          --repository-root source
          --mandant-config source/.config.json
          --releaselinien automation/config/releaselinien.json
          --repository-name "$INPUT_REPOSITORY_NAME"
