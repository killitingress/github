name: Reusable mandant configuration validation

# Dieser Workflow prüft Konfigurationen frühzeitig und spricht keine Zielsysteme an.
'on':
  workflow_call:
    inputs:
      repository_name:
        required: true
        type: string
      commit_sha:
        required: true
        type: string
      automation_repository:
        required: true
        type: string
      automation_ref:
        required: true
        type: string
      runner_label:
        required: false
        default: mtext-delivery
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate mandant configuration
    runs-on:
      - self-hosted
      - linux
      - ${{ inputs.runner_label }}
    timeout-minutes: 20
    steps:
      - name: Check out mandant repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          path: source
          persist-credentials: false
          ref: ${{ inputs.commit_sha }}

      - name: Check out pinned automation
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: ${{ inputs.automation_repository }}
          ref: ${{ inputs.automation_ref }}
          path: automation
          persist-credentials: false

      - name: Prepare approved Python runtime
        id: runtime
        run: automation/scripts/runner-preflight.sh

      - name: Validate configuration without external access
        env:
          INPUT_REPOSITORY_NAME: ${{ inputs.repository_name }}
          PYTHONPATH: automation/src
        run: >-
          "${{ steps.runtime.outputs.python }}" -m lbs_delivery validate-config
          --mandant-config source/config/mandant.json
          --release-lines automation/config/release_lines.json
          --repository-name "$INPUT_REPOSITORY_NAME"
