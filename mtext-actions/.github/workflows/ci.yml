name: Central tests

# Die zentrale Prüfung läuft nur bei Änderungen an der Automatisierung und hat keine externen Seiteneffekte.
'on':
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: central-tests-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test central automation
    runs-on:
      - self-hosted
      - linux
      - mtext-delivery
    timeout-minutes: 20
    steps:
      # Repository und Abhängigkeiten werden reproduzierbar aus festgelegten Quellen geladen.
      - name: Check out automation
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Prepare approved Python runtime
        id: runtime
        run: scripts/runner-preflight.sh

      - name: Run central tests without external side effects
        env:
          PYTHONPATH: src
        run: >-
          "${{ steps.runtime.outputs.python }}" -m unittest discover
          -s tests -v
