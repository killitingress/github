name: Central tests

# Die Prüfung besitzt keine externen Seiteneffekte und benötigt nur Leserechte.
'on':
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# Neuere Commits ersetzen laufende Tests derselben Änderung.
concurrency:
  group: central-tests-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Der Job verwendet ausschließlich den freigegebenen Self-hosted Runner.
  test:
    name: Test central automation
    runs-on:
      - self-hosted
      - linux
      - mtext-delivery
    timeout-minutes: 20
    steps:
      - name: Check out automation without persisted credentials
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Prepare approved Python runtime
        id: runtime
        run: scripts/runner-preflight.sh

      - name: Run tests without external calls
        env:
          PYTHONPATH: src
        run: >-
          "${{ steps.runtime.outputs.python }}" -m unittest discover
          -s tests -v
