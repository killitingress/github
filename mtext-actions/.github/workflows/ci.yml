name: Central tests

# Dieser Workflow führt bei Pull Requests und Änderungen an main alle zentralen
# Python-Tests aus, ohne M/Text oder den Mainframe anzusprechen.
'on':
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

# Neuere Commits ersetzen laufende Tests derselben Änderung.
concurrency:
  group: central-tests-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Das Platzhalter-Label wird vor dem Integrationslauf durch das offizielle
  # runs-on-Kennzeichen des von FI bereitgestellten Runners ersetzt.
  test:
    name: Test central automation
    runs-on: FI_RUNNER_LABEL_TO_BE_SET
    timeout-minutes: 20
    steps:
      # Lädt den zu prüfenden Automatisierungsstand in den Arbeitsbereich und
      # hinterlegt dabei kein GitHub-Token in der lokalen Git-Konfiguration.
      - name: Check out automation without persisted credentials
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      # Prüft den von FI bereitgestellten Runner und stellt den Pfad zur freigegebenen
      # Python-Laufzeit als Ausgabe für die nachfolgenden Schritte bereit.
      - name: Prepare approved Python runtime
        id: runtime
        run: scripts/runner-preflight.sh

      # Startet die vollständige Unit-Test-Suite mit dem produktiven Quellcode
      # im Python-Suchpfad; die Tests führen keine externen Übergaben aus.
      - name: Run tests without external calls
        env:
          PYTHONPATH: src
        run: >-
          "${{ steps.runtime.outputs.python }}" -m unittest discover
          -s tests -v
