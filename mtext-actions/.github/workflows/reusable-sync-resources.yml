name: Reusable M/Text resource sync

# Der Aufrufer übergibt einen unveränderlichen Commit und eine fachlich festgelegte Zielstufe.
'on':
  workflow_call:
    inputs:
      repository_name:
        required: true
        type: string
      commit_sha:
        required: true
        type: string
      source_branch:
        required: true
        type: string
      target_environment:
        required: true
        type: string
      automation_repository:
        required: true
        type: string
      automation_ref:
        required: true
        type: string
      runner_label:
        required: false
        default: mtext-delivery
        type: string

permissions:
  contents: read

jobs:
  sync:
    name: Sync exact commit to M/Text
    runs-on:
      - self-hosted
      - linux
      - ${{ inputs.runner_label }}
    # Das Environment liefert die stufenspezifische Konfiguration und begrenzt sie auf diesen Job.
    environment: ${{ inputs.target_environment }}
    timeout-minutes: 30
    steps:
      - name: Check out mandant repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          path: source
          persist-credentials: false
          ref: ${{ inputs.commit_sha }}

      - name: Check out pinned automation
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: ${{ inputs.automation_repository }}
          ref: ${{ inputs.automation_ref }}
          path: automation
          persist-credentials: false

      - name: Prepare approved Python runtime
        id: runtime
        env:
          LBS_WHEELHOUSE: ${{ vars.LBS_WHEELHOUSE }}
        run: automation/scripts/runner-preflight.sh automation/requirements.lock

      - name: Stage, publish and synchronously call the adapter
        # Die Python-Schicht prüft Branch, Commit und Freigabeschalter vor jedem externen Aufruf.
        env:
          INPUT_COMMIT_SHA: ${{ inputs.commit_sha }}
          INPUT_REPOSITORY_NAME: ${{ inputs.repository_name }}
          INPUT_SOURCE_BRANCH: ${{ inputs.source_branch }}
          INPUT_TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
          PYTHONPATH: automation/src
        run: >-
          "${{ steps.runtime.outputs.python }}" -m lbs_delivery sync-resources
          --repository-root source
          --mandant-config source/config/mandant.json
          --mandant-schema automation/config/mandant.schema.json
          --deployments-config automation/config/deployments.json
          --deployments-schema automation/config/deployments.schema.json
          --repository-name "$INPUT_REPOSITORY_NAME"
          --commit "$INPUT_COMMIT_SHA"
          --source-branch "$INPUT_SOURCE_BRANCH"
          --environment "$INPUT_TARGET_ENVIRONMENT"
          --staging-dir "$RUNNER_TEMP/resources-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          --execute
