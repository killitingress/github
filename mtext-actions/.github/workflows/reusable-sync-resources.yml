name: Reusable M/Text resource sync

# Dieser wiederverwendbare Workflow prüft und paketiert einen unveränderlichen
# Mandanten-Commit und übergibt dessen Ressourcen synchron an die festgelegte M/Text-Stufe.
'on':
  workflow_call:
    inputs:
      repository_name:
        required: true
        type: string
      commit_sha:
        required: true
        type: string
      source_branch:
        required: true
        type: string
      target_environment:
        required: true
        type: string
      automation_ref:
        required: true
        type: string

permissions:
  contents: read

jobs:
  sync:
    name: Sync exact commit to M/Text
    # Das Platzhalter-Label wird durch das offizielle runs-on-Kennzeichen des
    # von der FI bereitgestellten Runners ersetzt.
    runs-on: FI_RUNNER_LABEL_TO_BE_SET
    # Das Environment liefert die stufenspezifische Konfiguration und begrenzt sie auf diesen Job.
    environment: ${{ inputs.target_environment }}
    timeout-minutes: 30
    steps:
      # Lädt den vollständig aufgelösten Mandanten-Commit einschließlich seiner
      # Historie, damit Branch-Zugehörigkeit und Vorgängerstände geprüft werden können.
      - name: Check out mandant repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          path: source
          persist-credentials: false
          ref: ${{ inputs.commit_sha }}

      # Lädt genau den vom Aufrufer festgelegten Commit der zentralen
      # Automatisierung, ohne Zugangsdaten in der Git-Konfiguration zu speichern.
      - name: Check out pinned automation
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: j520730/mtext-actions
          ref: ${{ inputs.automation_ref }}
          path: automation
          persist-credentials: false

      # Prüft den von der FI bereitgestellten Runner und stellt den Pfad zur freigegebenen
      # Python-Laufzeit als Ausgabe für die Synchronisation bereit.
      - name: Prepare approved Python runtime
        id: runtime
        run: automation/scripts/runner-preflight.sh

      # Validiert Mandantenkonfiguration, Branch und Commit, erzeugt ein temporäres
      # Ressourcenpaket und ruft den M/Text-Adapter synchron mit diesem Paket auf.
      - name: Stage, publish and synchronously call the adapter
        env:
          INPUT_COMMIT_SHA: ${{ inputs.commit_sha }}
          INPUT_REPOSITORY_NAME: ${{ inputs.repository_name }}
          INPUT_SOURCE_BRANCH: ${{ inputs.source_branch }}
          INPUT_TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
          PYTHONPATH: automation/src
        run: >-
          "${{ steps.runtime.outputs.python }}" -m lbs_delivery sync-resources
          --repository-root source
          --releaselinien automation/config/releaselinien.json
          --repository-name "$INPUT_REPOSITORY_NAME"
          --commit "$INPUT_COMMIT_SHA"
          --source-branch "$INPUT_SOURCE_BRANCH"
          --environment "$INPUT_TARGET_ENVIRONMENT"
          --staging-dir "$RUNNER_TEMP/resources-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          --execute
