name: Reusable release

# Dieser wiederverwendbare Workflow erzeugt aus einem Release-Tag ein FULL- oder
# DELTA-Artefakt und übergibt es erst in einem getrennt freizugebenden Job an den Mainframe.
'on':
  workflow_call:
    inputs:
      repository_name:
        required: true
        type: string
      release_tag:
        required: true
        type: string
      trigger_sha:
        required: false
        default: ''
        type: string
      automation_ref:
        required: true
        type: string
      retention_days:
        required: false
        default: 30
        type: number
      serialize_publication:
        description: Serialisiert Mainframe-Übergaben innerhalb eines Mandanten-Repositories
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  # Dieser Job besitzt keinen Zugriff auf Bereitstellungsdaten und erzeugt ausschließlich Release-Dateien.
  build:
    name: Build FULL or DELTA artifact
    # Das Platzhalter-Label wird durch das offizielle runs-on-Kennzeichen des
    # von FI bereitgestellten Runners ersetzt.
    runs-on: FI_RUNNER_LABEL_TO_BE_SET
    timeout-minutes: 30
    outputs:
      artifact_name: ${{ steps.metadata.outputs.artifact_name }}
    steps:
      # Lädt den durch den Release-Tag bezeichneten Mandanten-Commit mit seiner
      # Historie, damit Tag, Vorgänger-Release und Änderungsumfang geprüft werden können.
      - name: Check out tagged mandant commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          path: source
          persist-credentials: false
          ref: refs/tags/${{ inputs.release_tag }}

      # Lädt genau den vom Aufrufer festgelegten Stand der Build-Logik und
      # speichert keine GitHub-Zugangsdaten in der Git-Konfiguration.
      - name: Check out pinned automation
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: j520730/mtext-actions
          ref: ${{ inputs.automation_ref }}
          path: automation
          persist-credentials: false

      # Prüft den von FI bereitgestellten Runner und stellt den Pfad zur freigegebenen
      # Python-Laufzeit als Ausgabe für den Build bereit.
      - name: Prepare approved Python runtime
        id: runtime
        run: automation/scripts/runner-preflight.sh

      # Prüft Tag und Mandantenkonfiguration, ermittelt FULL oder DELTA und
      # erzeugt Release-Dateien, Manifest und Prüfsummen im Verzeichnis dist.
      - name: Build release and manifest
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_REPOSITORY_NAME: ${{ inputs.repository_name }}
          INPUT_TRIGGER_SHA: ${{ inputs.trigger_sha }}
          PYTHONPATH: automation/src
        run: >-
          "${{ steps.runtime.outputs.python }}" -m lbs_delivery build-release
          --repository-root source
          --releaselinien automation/config/releaselinien.json
          --repository-name "$INPUT_REPOSITORY_NAME"
          --tag "$INPUT_RELEASE_TAG"
          --trigger-sha "$INPUT_TRIGGER_SHA"
          --output dist

      # Bildet aus Repository und Release-Tag einen eindeutigen Artefaktnamen und
      # stellt ihn dem Upload sowie dem nachfolgenden Veröffentlichungsjob bereit.
      - name: Define artifact identity
        id: metadata
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          INPUT_REPOSITORY_NAME: ${{ inputs.repository_name }}
        run: printf 'artifact_name=%s-%s\n' "$INPUT_REPOSITORY_NAME" "$INPUT_RELEASE_TAG" >> "$GITHUB_OUTPUT"

      # Speichert den vollständigen dist-Inhalt ohne zusätzliche Komprimierung
      # als Laufartefakt; fehlende Build-Ausgaben lassen den Job fehlschlagen.
      - name: Store release artifact
        uses: actions/upload-artifact@c6a3b2bd78b3985e4b2f15397fec357f0fd808de
        with:
          name: ${{ steps.metadata.outputs.artifact_name }}
          path: dist/
          if-no-files-found: error
          retention-days: ${{ inputs.retention_days }}
          compression-level: 0

  # Erst dieser Job bindet das geschützte Environment und darf externe Systeme ansprechen.
  publish:
    name: Verify and hand over artifact to Mainframe
    needs: build
    # Auch der freizugebende Publish-Job verwendet ausschließlich den zentral
    # festgelegten FI-Runner und keine Auswahl des Mandanten-Workflows.
    runs-on: FI_RUNNER_LABEL_TO_BE_SET
    environment: Bereitstellung
    concurrency:
      group: ${{ inputs.serialize_publication && format('mainframe-{0}', github.repository) || format('mainframe-{0}-{1}', github.repository, github.run_id) }}
      cancel-in-progress: false
    timeout-minutes: 30
    steps:
      # Lädt genau den festgelegten Stand der Übergabelogik und der JCL-Vorlage,
      # ohne GitHub-Zugangsdaten in der Git-Konfiguration zu speichern.
      - name: Check out pinned automation
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          repository: j520730/mtext-actions
          ref: ${{ inputs.automation_ref }}
          path: automation
          persist-credentials: false

      # Lädt ausschließlich das vom Build-Job dieses Workflow-Laufs benannte
      # Release-Artefakt in das lokale Verzeichnis dist.
      - name: Download exact release artifact
        uses: actions/download-artifact@ad191675b41f6a5b46da9a048cb6893812da158b
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: dist

      # Prüft den von FI bereitgestellten Runner und stellt den Pfad zur freigegebenen
      # Python-Laufzeit als Ausgabe für die Mainframe-Übergabe bereit.
      - name: Prepare approved Python runtime
        id: runtime
        run: automation/scripts/runner-preflight.sh

      # Validiert Manifest und Prüfsummen erneut, überträgt das Artefakt per FTP,
      # rendert die JCL in einem temporären Verzeichnis und reicht sie bei JES ein.
      - name: Verify artifact, render JCL and submit FTP/JES
        env:
          MAINFRAME_FTP_HOST: ${{ secrets.MAINFRAME_FTP_HOST }}
          MAINFRAME_FTP_PASSWORD: ${{ secrets.MAINFRAME_FTP_PASSWORD }}
          MAINFRAME_FTP_USER: ${{ secrets.MAINFRAME_FTP_USER }}
          PYTHONPATH: automation/src
        run: >-
          "${{ steps.runtime.outputs.python }}" -m lbs_delivery publish-mainframe
          --manifest dist/manifest.json
          --artifact-root dist
          --template automation/templates/mainframe-upload.jcl
          --temporary-dir "$RUNNER_TEMP/jcl-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          --execute
