name: Validate mandant configuration

# Dieser Workflow prüft jede geänderte Mandantenkonfiguration mit der zentralen
# Validierungslogik, ohne Daten an M/Text oder den Mainframe zu übertragen.
'on':
  # Der Check liefert bei jeder Änderung der Mandantenkonfiguration frühes Feedback.
  push:
    branches:
      - '**'
    paths:
      - .config.json

permissions:
  contents: read

concurrency:
  group: config-validation-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Dieser Aufruf lässt den exakten Commit durch den fest gepinnten zentralen
  # Validierungsworkflow prüfen.
  validate:
    name: Validate mandant configuration
    uses: j520730/mtext-actions/.github/workflows/reusable-validate-config.yml@0000000000000000000000000000000000000000
    with:
      # Die Null-SHAs sind technische Platzhalter und werden vor dem ersten Integrationslauf ersetzt.
      repository_name: ${{ github.event.repository.name }}
      commit_sha: ${{ github.sha }}
      automation_repository: j520730/mtext-actions
      automation_ref: 0000000000000000000000000000000000000000
