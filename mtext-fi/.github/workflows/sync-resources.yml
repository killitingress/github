name: Sync M/Text resources

# Dieser Workflow verteilt den exakten Stand eines Entwicklungs- oder
# Abnahme-Branches über die zentrale Automatisierung an die zugehörige M/Text-Stufe.
'on':
  # Nur Änderungen auf den Branches für Entwicklung und Abnahme lösen automatisch eine Verteilung aus.
  push:
    branches:
      - R[0-9][0-9][0-9]/Entwicklung
      - R[0-9][0-9][0-9]/Abnahme
  # Initiale Vollsynchronisationen und Wiederholungen verlangen einen exakten
  # Commit und den dazugehörigen Branch.
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Exakter Commit-SHA für initiale Vollsynchronisation oder Wiederholung
        required: true
        type: string
      source_branch:
        description: Branch im Format Rnnn/Entwicklung oder Rnnn/Abnahme
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: mtext-sync-${{ github.repository }}-${{ inputs.source_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  # Dieser Aufruf übergibt Commits der Entwicklungs-Branches ausschließlich an
  # den zentralen Workflow mit dem fest vorgegebenen Environment Entwicklung.
  sync-entwicklung:
    name: Sync to Entwicklung
    if: >-
      (github.event_name == 'push' && endsWith(github.ref_name, '/Entwicklung')) ||
      (github.event_name == 'workflow_dispatch' && endsWith(inputs.source_branch, '/Entwicklung'))
    uses: j520730/mtext-actions/.github/workflows/reusable-sync-resources.yml@0000000000000000000000000000000000000000
    with:
      # Die Null-SHAs sind technische Platzhalter und werden vor dem ersten Integrationslauf ersetzt.
      repository_name: ${{ github.event.repository.name }}
      commit_sha: ${{ inputs.commit_sha || github.sha }}
      source_branch: ${{ github.event_name == 'push' && github.ref_name || inputs.source_branch }}
      target_environment: Entwicklung
      automation_repository: j520730/mtext-actions
      automation_ref: 0000000000000000000000000000000000000000

  # Dieser Aufruf übergibt Commits der Abnahme-Branches ausschließlich an den
  # zentralen Workflow mit dem fest vorgegebenen Environment Abnahme.
  sync-abnahme:
    name: Sync to Abnahme
    if: >-
      (github.event_name == 'push' && endsWith(github.ref_name, '/Abnahme')) ||
      (github.event_name == 'workflow_dispatch' && endsWith(inputs.source_branch, '/Abnahme'))
    uses: j520730/mtext-actions/.github/workflows/reusable-sync-resources.yml@0000000000000000000000000000000000000000
    with:
      repository_name: ${{ github.event.repository.name }}
      commit_sha: ${{ inputs.commit_sha || github.sha }}
      source_branch: ${{ github.event_name == 'push' && github.ref_name || inputs.source_branch }}
      target_environment: Abnahme
      automation_repository: j520730/mtext-actions
      automation_ref: 0000000000000000000000000000000000000000
