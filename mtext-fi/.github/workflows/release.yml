name: Build and publish release

# Dieser Workflow lässt aus einem vorhandenen Release-Tag ein unveränderliches
# Release-Artefakt bauen, prüfen und an den Mainframe übergeben.
'on':
  # Das Mandanten-Release-Team setzt den Tag. Erst dessen Push startet Build und
  # nachgelagerte Übergabe.
  push:
    tags:
      - R[0-9][0-9][0-9].[0-9][0-9][0-9]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Vorhandener Release-Tag im Format Rnnn.nnn
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.repository }}-${{ inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  # Dieser Aufruf übergibt den Release-Tag an den zentralen Workflow, der Build
  # und Veröffentlichung in getrennten Jobs ausführt.
  release:
    name: Build and publish release
    uses: j520730/mtext-actions/.github/workflows/reusable-release.yml@0000000000000000000000000000000000000000
    with:
      # Die Einrichtungsautomation ersetzt beide technischen Platzhalter gemeinsam
      # durch die freigegebene zentrale Workflowversion.
      repository_name: ${{ github.event.repository.name }}
      release_tag: ${{ inputs.release_tag || github.ref_name }}
      trigger_sha: ${{ github.event_name == 'push' && github.sha || '' }}
      automation_ref: 0000000000000000000000000000000000000000
      serialize_publication: true
